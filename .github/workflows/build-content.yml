name: Build content-data.js

on:
  push:
    branches: [main]
    paths:
      - "content/articles/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Push back with the default token, but don't re-trigger this
          # workflow (paths filter only matches content/articles/** anyway,
          # and this job never touches that folder).
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rebuild content-data.js
        run: python3 scripts/build_content.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content-data.js; then
            echo "content-data.js unchanged, nothing to commit"
          else
            git add content-data.js
            git commit -m "chore: rebuild content-data.js from content/articles"
            git push
          fi
