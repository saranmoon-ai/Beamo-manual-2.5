<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Beamo Manual Center</title>
<link rel="icon" type="image/png" href="beamo-mark-blue.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-blob-3" aria-hidden="true"></div>
<div class="page-blob-4" aria-hidden="true"></div>
<div class="page-blob-5" aria-hidden="true"></div>
<div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

<div class="floating-search" id="floating-search">
  <button type="button" class="floating-search-btn" id="floating-search-btn" aria-label="search">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor"><circle cx="9" cy="9" r="6.2" stroke-width="1.6"/><path d="M13.6 13.6 17.5 17.5" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <input type="text" id="floating-search-input" class="floating-search-input" />
  <button type="button" class="floating-search-submit" id="floating-search-submit-btn">검색</button>
</div>

<header>
  <div class="logo" id="logo-home">
    <img src="beamo-mark-white.png" alt="Beamo" class="logo-mark" />
    <div class="logo-text" id="site-name">Beamo <span>매뉴얼</span></div>
  </div>
  <div class="header-right">
    <a href="https://accounts.beamo.ai/login" target="_blank" rel="noopener" class="portal-btn" id="portal-btn">
      <svg viewBox="0 0 20 20"><path d="M7.5 3.5H4.8a1.3 1.3 0 0 0-1.3 1.3v10.4a1.3 1.3 0 0 0 1.3 1.3h2.7M12.5 13.5 16.5 10 12.5 6.5M16 10H7.5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="portal-btn-label">Beamo Portal 연결</span>
    </a>
    <div class="lang-switch">
      <button data-lang="ko" class="active">한국어</button>
      <button data-lang="en">English</button>
      <button data-lang="ja">日本語</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-watermark" aria-hidden="true"></div>
  <div class="hero-label" id="hero-label">BEAMO OFFICIAL MANUAL</div>
  <h1 id="hero-title">beamo 통합 매뉴얼 센터</h1>
  <p id="hero-subtitle">버전, 환경, 기능, 사용자 유형, 단계별로 원하는 가이드를 빠르게 찾아보세요.</p>
  <div class="hero-search">
    <span class="search-icon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor"><circle cx="9" cy="9" r="6.2" stroke-width="1.6"/><path d="M13.6 13.6 17.5 17.5" stroke-width="1.6" stroke-linecap="round"/></svg></span>
    <input type="text" id="hero-search-input" placeholder="검색어를 입력하세요" />
    <button type="button" class="hero-search-submit" id="hero-search-submit-btn">검색</button>
  </div>
</section>

<section class="browse" id="browse-section">
  <div class="section-head">
    <div class="eng" id="browse-eng">BROWSE BY</div>
    <h2 id="browse-title">원하는 기준으로 찾아보기</h2>
    <p id="browse-desc">다섯 가지 기준 중 하나를 선택해 세부 항목을 좁혀나갈 수 있습니다.</p>
  </div>

  <div class="quick-manual-row" id="quick-manual-row">
    <button type="button" class="qm-btn" data-key="qm-surveyor-app">
      <span class="qm-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor"><path d="M10 2.5 3.5 6v4.5c0 3.7 2.7 6.4 6.5 7.5 3.8-1.1 6.5-3.8 6.5-7.5V6L10 2.5Z" stroke-width="1.6" stroke-linejoin="round"/><path d="M7.3 10.2 9.2 12l3.5-4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="qm-content">
        <span class="qm-title" id="qm-surveyor-title"></span>
        <span class="qm-sub" id="qm-surveyor-sub"></span>
      </span>
    </button>
    <button type="button" class="qm-btn" data-key="qm-admin-web">
      <span class="qm-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor"><path d="M10 2.5 3.5 6v4.5c0 3.7 2.7 6.4 6.5 7.5 3.8-1.1 6.5-3.8 6.5-7.5V6L10 2.5Z" stroke-width="1.6" stroke-linejoin="round"/><path d="M7.3 10.2 9.2 12l3.5-4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="qm-content">
        <span class="qm-title" id="qm-admin-title"></span>
        <span class="qm-sub" id="qm-admin-sub"></span>
      </span>
    </button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="panel" id="panel">
    <div class="chip-list" id="chip-list"></div>
    <div class="result-box">
      <div class="result-title" id="result-title"></div>
      <div id="result-area"></div>
    </div>
  </div>
</section>

<footer>
  <img src="beamo-mark-white.png" alt="beamo" class="footer-logo" />
  <div class="footer-links" id="footer-links"></div>
  <div class="footer-social" id="footer-social"></div>
  <div class="footer-copy" id="footer-copy"></div>
</footer>

<script src="content-data.js"></script>
<script src="i18n-ui.js"></script>
<script src="app.js"></script>
</body>
</html>
