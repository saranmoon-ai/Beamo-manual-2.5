<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beamo 매뉴얼 편집기</title>
  <style>
    /*
      Decap CMS ships as a compiled bundle with hashed CSS-in-JS class names
      (e.g. "css-zwje8v-LoginButton-..."), so exact class matches break on
      every Decap version bump. Decap keeps the component's display name
      inside the class string though, so we target that substring with
      [class*="..."] instead - more durable, but still unofficial (there's
      no supported theming API - only the preview pane can be themed
      officially). If a future Decap update renames these components, these
      rules just silently stop matching (safe failure - nothing breaks).

      This pass only covers the pre-login screen, which is all we can see
      without actually signing in. The signed-in screens (sidebar, entry
      editor, save button) aren't covered yet.
    */
    :root {
      --beamo-accent: #0046CC;
      --beamo-accent-hover: #3370DB;
      --beamo-bg: #F5F8FF;
    }

    body {
      background: var(--beamo-bg) !important;
    }

    /* Decap wordmark -> Beamo logo */
    span[class*="DecapLogoIcon"] svg {
      display: none;
    }

    /* Login button -> Beamo blue */

      background-color: var(--beamo-accent) !important;
      transition: background-color 0.15s ease;

    button[class*="LoginButton"]:hover {

    /* Custom "html-wysiwyg" widget (see script below) */
    .beamo-html-editor {
      min-height: 220px;
      padding: 14px 16px;
      border: 1px solid #E8E8E8;
      border-radius: 6px;
      background: #fff;
      line-height: 1.75;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;

    .beamo-html-editor:focus {
      outline: 2px solid var(--beamo-accent);
      outline-offset: 1px;
    }
    .beamo-html-editor h2 { font-size: 1.15rem; font-weight: 700; margin: 0.9rem 0 0.4rem; }
    .beamo-html-editor h2:first-child { margin-top: 0; }
    .beamo-html-editor h3 { font-size: 1.02rem; font-weight: 700; margin: 0.7rem 0 0.35rem; }
    .beamo-html-editor p { margin: 0 0 0.6rem; }
    .beamo-html-editor ul, .beamo-html-editor ol { margin: 0 0 0.6rem; padding-left: 1.25rem; }
    .beamo-html-editor li { margin-bottom: 0.25rem; }
    .beamo-html-editor strong { font-weight: 700; }
    .beamo-html-editor blockquote {
      margin: 0 0 0.6rem;
      padding: 0.4rem 0.9rem;
      border-left: 3px solid var(--beamo-accent);
      background: var(--beamo-bg);
      color: #4E4E4E;
    }
    .beamo-html-editor img { max-width: 100%; }

    .beamo-insert-image-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--beamo-accent);
      background: var(--beamo-bg);
      border: 1px solid var(--beamo-accent);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .beamo-insert-image-btn:hover {
      background: var(--beamo-accent);
      color: #fff;
    }

<body>
  <!-- Decap CMS (formerly Netlify CMS) loaded from CDN - no build step needed. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!--
    Decap has no built-in widget that edits raw HTML with a rendered,
    directly-editable view - "markdown"/"richtext" both store markdown, and
    converting our existing (Confluence-sourced) HTML through markdown risks
    mangling tables/nested lists on save. This is a small custom widget
    (Decap's documented registerWidget extension point, not a hack) that
    shows the real rendered HTML in a contentEditable box and writes
    whatever you type straight back as HTML - no markdown round-trip.

    `createClass` and `h` (React.createElement) are exposed as globals by
    decap-cms.js itself, so no separate React script tag is needed.
  -->
  <script>
    (function () {
      var HtmlWysiwygControl = createClass({
        componentDidMount: function () {
          if (this.el) {
            this.el.innerHTML = this.props.value || '';
          }
        },
        shouldComponentUpdate: function (nextProps) {
          // This node's content is owned by the browser (contentEditable),
          // not React - letting React re-render it on every keystroke would
          // reset the cursor to the start each time. The one exception is
          // mediaPaths: that's how Decap hands back a picked/uploaded image,
          // and componentDidUpdate (which only fires when this returns
          // true) is what we use to notice it.
          return nextProps.mediaPaths !== this.props.mediaPaths;
        },
        componentDidUpdate: function () {
          var mediaPaths = this.props.mediaPaths;
          if (!mediaPaths) return;
          var controlID = this.getMediaControlID();
          var mediaPath = mediaPaths.get ? mediaPaths.get(controlID) : null;
          if (mediaPath && mediaPath !== this._lastInsertedPath) {
            this._lastInsertedPath = mediaPath;
            this.insertImageAtSavedRange(mediaPath);
            if (this.props.onRemoveInsertedMedia) {
              this.props.onRemoveInsertedMedia(controlID);
            }
          }
        },
        getMediaControlID: function () {
          if (!this._mediaControlID) {
            this._mediaControlID = 'html-wysiwyg-' + Math.random().toString(36).slice(2);
          }
          return this._mediaControlID;
        },
        handleInput: function () {
          this.props.onChange(this.el.innerHTML);
        },
        saveSelection: function () {
          var sel = window.getSelection();
          if (sel && sel.rangeCount > 0 && this.el && this.el.contains(sel.anchorNode)) {
            this.savedRange = sel.getRangeAt(0).cloneRange();
          }
        },
        insertImageAtSavedRange: function (path) {
          if (!this.el) return;
          var img = document.createElement('img');
          img.src = path;
          img.alt = '';

          if (this.savedRange && this.el.contains(this.savedRange.startContainer)) {
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(this.savedRange);
            this.savedRange.deleteContents();
            this.savedRange.insertNode(img);
            this.savedRange.setStartAfter(img);
            this.savedRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(this.savedRange);
          } else {
            this.el.appendChild(img);
          }
          this.handleInput();
        },
        handleInsertImageMouseDown: function (e) {
          // preventDefault stops the button from stealing focus away from
          // the contentEditable box, so the text cursor position survives
          // long enough for saveSelection() to capture it.
          e.preventDefault();
          this.saveSelection();
        },
        handleInsertImageClick: function () {
          if (!this.props.onOpenMediaLibrary) return;
          this.props.onOpenMediaLibrary({
            controlID: this.getMediaControlID(),
            forImage: true,
            privateUpload: this.props.field && this.props.field.get ? this.props.field.get('private') : undefined,
            value: null,
            allowMultiple: false,
            config: this.props.field && this.props.field.get ? this.props.field.get('media_library') : undefined,
            field: this.props.field,
          });
        },
        render: function () {
          var self = this;
          return h(
            'div',
            null,
            h(
              'button',
              {
                type: 'button',
                className: 'beamo-insert-image-btn',
                onMouseDown: this.handleInsertImageMouseDown,
                onClick: this.handleInsertImageClick,
              },
              '🖼 이미지 삽입',
            ),
            h('div', {
              id: this.props.forID,
              className: (this.props.classNameWrapper || '') + ' beamo-html-editor',
              contentEditable: true,
              suppressContentEditableWarning: true,
              onInput: this.handleInput,
              onMouseUp: this.saveSelection,
              onKeyUp: this.saveSelection,
              ref: function (el) { self.el = el; },
            }),
          );
        },
      });

      var HtmlWysiwygPreview = createClass({
        render: function () {
          return h('div', {
            className: 'beamo-html-editor beamo-html-editor-preview',
            dangerouslySetInnerHTML: { __html: this.props.value || '' },
          });
        },
      });

      CMS.registerWidget('html-wysiwyg', HtmlWysiwygControl, HtmlWysiwygPreview);

      // The preview pane (right side) renders inside its own iframe, so the
      // page-level <style> block above never reaches it - Decap requires
      // registerPreviewStyle() specifically for anything shown there.
      CMS.registerPreviewStyle(
        '.beamo-html-editor-preview, .beamo-html-editor-preview * {' +
        '  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;' +
        '}' +
        '.beamo-html-editor-preview {' +
        '  font-size: 15px;' +
